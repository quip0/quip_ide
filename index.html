<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src http://127.0.0.1:* ws://127.0.0.1:*;" />
  <title>get shit done.</title>
  <link rel="stylesheet" href="dist/renderer.css" />
</head>
<body>
  <div id="app">
    <div id="drag-strip"></div>
    <div id="main">
      <div id="tree" class="hidden" tabindex="0"></div>
      <div id="content-col">
        <div id="tabs" class="hidden"></div>
        <div id="panes">
          <div id="content">
            <div id="welcome">
              <div class="w-title">get shit done.</div>
              <div class="w-hint"><kbd>&#8984;O</kbd> open folder</div>
              <div class="w-hint dim"><kbd>\e</kbd> file tree &nbsp; <kbd>&#8984;J</kbd> terminal &nbsp; <kbd>:cheat</kbd> keys</div>
            </div>
            <div id="editor" class="hidden"></div>
          </div>
          <div id="split" class="hidden">
            <div id="split-placeholder"><span><kbd>:open &lt;file&gt;</kbd> or <kbd>:term</kbd></span></div>
            <div id="split-editor" class="hidden"></div>
            <div id="split-term" class="hidden"></div>
          </div>
        </div>
      </div>
      <div id="cheat-overlay" class="hidden"><div id="cheat-panel"></div></div>
    </div>
    <div id="termwrap" class="hidden"><div id="term"></div></div>
    <div id="cmdline" class="hidden"><span>:</span><input id="cmdline-input" type="text" spellcheck="false" autocapitalize="off" /></div>
    <div id="status"><span><span id="status-mode"></span><span id="status-left"></span></span><span id="status-right"></span></div>
  </div>
  <script src="dist/renderer.js"></script>
</body>
</html>
