<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src http://127.0.0.1:* ws://127.0.0.1:*;" />
  <title>quip</title>
  <link rel="stylesheet" href="dist/renderer.css" />
</head>
<body>
  <div id="app">
    <div id="drag-strip"></div>
    <div id="main">
      <div id="tree" class="hidden" tabindex="0"></div>
      <div id="content">
        <div id="welcome">
          <div class="w-title">quip</div>
          <div class="w-hint"><kbd>&#8984;O</kbd> open folder</div>
          <div class="w-hint dim"><kbd>\e</kbd> file tree &nbsp; <kbd>&#8984;J</kbd> terminal</div>
        </div>
        <div id="editor" class="hidden"></div>
        <div id="notebook" class="hidden" tabindex="0"></div>
      </div>
    </div>
    <div id="termwrap" class="hidden"><div id="term"></div></div>
    <div id="status"><span id="status-left"></span><span id="status-right"></span></div>
  </div>
  <script src="dist/renderer.js"></script>
</body>
</html>
